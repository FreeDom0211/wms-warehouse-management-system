<div class="card">
    <div class="card-header">
        <span class="card-title">📋 任务看板</span>
    </div>
    <div class="card-body">
        <div class="task-grid" id="taskGrid">
            <div class="task-card" data-status="PENDING">
                <div class="task-icon">⏰</div>
                <div class="task-count" id="pendingCount">0</div>
                <div class="task-label">待处理</div>
            </div>
            <div class="task-card" data-status="IN_PROGRESS">
                <div class="task-icon">🔄</div>
                <div class="task-count" id="inProgressCount">0</div>
                <div class="task-label">进行中</div>
            </div>
            <div class="task-card" data-status="COMPLETED">
                <div class="task-icon">✅</div>
                <div class="task-count" id="completedCount">0</div>
                <div class="task-label">已完成</div>
            </div>
        </div>
        
        <div class="table-wrapper" style="margin-top: 32px;">
            <table class="data-table" id="taskTable">
                <thead>
                    <tr>
                        <th>任务ID</th>
                        <th>任务类型</th>
                        <th>关联单号</th>
                        <th>状态</th>
                        <th>操作员</th>
                        <th>创建时间</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<style>
.task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
}

.task-card {
    background: white;
    border-radius: 24px;
    padding: 28px;
    text-align: center;
    box-shadow: 
        8px 8px 16px rgba(0, 0, 0, 0.06),
        -4px -4px 8px rgba(255, 255, 255, 0.8);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
}

.task-card:hover {
    transform: translateY(-6px);
    box-shadow: 
        12px 12px 24px rgba(0, 0, 0, 0.1),
        -6px -6px 12px rgba(255, 255, 255, 0.9);
}

.task-card[data-status="PENDING"] {
    background: linear-gradient(145deg, #FFEEEF, #FFDDE0);
}

.task-card[data-status="IN_PROGRESS"] {
    background: linear-gradient(145deg, #E6F4FA, #D4EEF7);
}

.task-card[data-status="COMPLETED"] {
    background: linear-gradient(145deg, #E8F8ED, #D4F5DC);
}

.task-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.task-count {
    font-size: 42px;
    font-weight: 800;
    color: #3D405B;
    margin-bottom: 8px;
}

.task-label {
    font-size: 15px;
    font-weight: 700;
    color: #6B6B6B;
}
</style>

<script>
(function() {
    loadTaskData();
})();

function loadTaskData() {
    const userStr = localStorage.getItem('user');
    const currentUserId = userStr ? JSON.parse(userStr).id : 3;
    
    apiGet('/task/operator/' + currentUserId).then(res => {
        let tasks = [];
        if (res && res.data) {
            if (Array.isArray(res.data)) {
                tasks = res.data;
            } else if (res.data.records) {
                tasks = res.data.records;
            }
        }
        renderTaskStats(tasks);
        renderTaskTable(tasks);
    }).catch(err => {
        console.error('加载任务数据失败:', err);
        renderTaskStats([]);
        renderTaskTable([]);
    });
}

function renderTaskStats(tasks) {
    const pending = tasks.filter(t => t.status === 'PENDING').length;
    const inProgress = tasks.filter(t => t.status === 'IN_PROGRESS').length;
    const completed = tasks.filter(t => t.status === 'COMPLETED').length;
    
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('inProgressCount').textContent = inProgress;
    document.getElementById('completedCount').textContent = completed;
}

function renderTaskTable(tasks) {
    const tbody = document.getElementById('taskTableBody');
    if (!tbody) return;
    
    if (!tasks || tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">暂无任务</td></tr>';
        return;
    }
    
    tbody.innerHTML = tasks.map(item => `
        <tr>
            <td>${item.id}</td>
            <td>${getTaskTypeText(item.taskType)}</td>
            <td>${item.relatedNo || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getStatusStyle(item.status)}">
                    ${getStatusText(item.status)}
                </span>
            </td>
            <td>${item.operatorName || '-'}</td>
            <td>${formatDate(item.createTime)}</td>
        </tr>
    `).join('');
}

function getTaskTypeText(type) {
    const map = { 'STOCK_IN': '入库任务', 'STOCK_OUT': '出库任务', 'INVENTORY': '盘点任务' };
    return map[type] || type;
}

function getStatusText(status) {
    const map = { 'PENDING': '待处理', 'IN_PROGRESS': '进行中', 'COMPLETED': '已完成' };
    return map[status] || status;
}

function getStatusStyle(status) {
    if (status === 'PENDING') return 'background: #FFEEEF; color: #8B4557;';
    if (status === 'IN_PROGRESS') return 'background: #E6F4FA; color: #4A90A4;';
    if (status === 'COMPLETED') return 'background: #E8F8ED; color: #2D5A3D;';
    return 'background: #F5F0E8; color: #6B6B6B;';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}
</script>
