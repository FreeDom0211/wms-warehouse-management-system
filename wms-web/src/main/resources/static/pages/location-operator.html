<div class="card">
    <div class="card-header">
        <span class="card-title">📍 货位管理</span>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table class="data-table" id="locationTable">
                <thead>
                    <tr>
                        <th>货位ID</th>
                        <th>货位编码</th>
                        <th>所属仓库</th>
                        <th>区域</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="locationTableBody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
(function() {
    loadLocationData(1);
})();

function loadLocationData(page) {
    apiGet('/location', { page: page, limit: 10 }).then(res => {
        let records = [];
        let total = 0;
        if (res && res.data) {
            if (Array.isArray(res.data)) {
                records = res.data;
                total = records.length;
            } else if (res.data.records) {
                records = res.data.records;
                total = res.data.total;
            } else if (res.data.records === undefined && res.data.total !== undefined) {
                records = res.data.records || [];
                total = res.data.total;
            }
        }
        renderTable(records);
        renderPagination(page, Math.ceil(total / 10));
    }).catch(err => {
        console.error('加载货位数据失败:', err);
        renderTable([]);
        renderPagination(page, 1);
    });
}

function renderTable(records) {
    const tbody = document.getElementById('locationTableBody');
    if (!tbody) return;
    
    if (!records || records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">暂无货位数据</td></tr>';
        return;
    }
    
    const warehouseNames = {
        1: '北京仓库',
        2: '上海仓库',
        3: '广州仓库'
    };
    
    tbody.innerHTML = records.map(item => `
        <tr>
            <td>${item.id}</td>
            <td>${item.locationCode || '-'}</td>
            <td>${warehouseNames[item.warehouseId] || '-'}</td>
            <td>${item.zone || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getStatusStyle(item.status)}">
                    ${getStatusText(item.status)}
                </span>
            </td>
        </tr>
    `).join('');
}

function getStatusText(status) {
    const map = { 'EMPTY': '空闲', 'OCCUPIED': '使用中', 'EXCEPTION': '异常' };
    return map[status] || status;
}

function getStatusStyle(status) {
    if (status === 'EMPTY') return 'background: #E8F8ED; color: #2D5A3D;';
    if (status === 'OCCUPIED') return 'background: #E6F4FA; color: #4A90A4;';
    if (status === 'EXCEPTION') return 'background: #FFEEEF; color: #8B4557;';
    return 'background: #FFF8E8; color: #A08040;';
}

function renderPagination(currentPage, totalPages) {
    const pagination = document.getElementById('pagination');
    if (!pagination || totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadLocationData(${currentPage - 1})">‹</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            html += `<button class="page-btn active">${i}</button>`;
        } else {
            html += `<button class="page-btn" onclick="loadLocationData(${i})">${i}</button>`;
        }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadLocationData(${currentPage + 1})">›</button>`;
    
    pagination.innerHTML = html;
}
</script>
