<div class="card">
    <div class="card-header">
        <span class="card-title">🔑 权限管理</span>
        <button class="btn btn-primary" onclick="showAddPermissionModal()">+ 添加权限</button>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table class="data-table" id="permissionTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>权限编码</th>
                        <th>权限名称</th>
                        <th>所属模块</th>
                        <th>描述</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="permissionTableBody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
(function() {
    loadPermissionData(1);
})();

function loadPermissionData(page) {
    apiGet('/permission', { pageNum: page, pageSize: 10 }).then(res => {
        if (!res || !res.data) {
            renderPermissionTable([]);
            renderPermissionPagination(page, 0);
            return;
        }
        const pageData = res.data;
        const records = pageData.records || pageData.list || [];
        const total = pageData.total || pageData.count || 0;
        renderPermissionTable(records);
        renderPermissionPagination(page, Math.ceil(total / 10));
    }).catch(err => {
        console.error('加载数据失败:', err);
        renderPermissionTable([]);
        renderPermissionPagination(page, 0);
    });
}

function renderPermissionTable(records) {
    const tbody = document.getElementById('permissionTableBody');
    if (!tbody) return;
    
    if (!records || records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">暂无数据</td></tr>';
        return;
    }
    
    tbody.innerHTML = records.map(item => `
        <tr>
            <td>${item.id}</td>
            <td>${item.permCode || '-'}</td>
            <td>${item.permName || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; background: #E8F4FD; color: #2D5A7D;">
                    ${item.menuUrl ? '菜单' : '其他'}
                </span>
            </td>
            <td>-</td>
            <td>${formatDate(item.createTime)}</td>
            <td>
                <button class="btn btn-primary" style="padding:6px 12px; font-size:12px; margin-right:6px;" onclick="editPermission(${item.id})">编辑</button>
                <button class="btn btn-danger" style="padding:6px 12px; font-size:12px;" onclick="deletePermission(${item.id})">删除</button>
            </td>
        </tr>
    `).join('');
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

function renderPermissionPagination(currentPage, totalPages) {
    const pagination = document.getElementById('pagination');
    if (!pagination || totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadPermissionData(${currentPage - 1})">‹</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            html += `<button class="page-btn active">${i}</button>`;
        } else {
            html += `<button class="page-btn" onclick="loadPermissionData(${i})">${i}</button>`;
        }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadPermissionData(${currentPage + 1})">›</button>`;
    
    pagination.innerHTML = html;
}

function showAddPermissionModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay active';
    modal.innerHTML = `
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">添加权限</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div>
                <div class="form-group">
                    <label class="form-label">权限编码</label>
                    <input type="text" class="form-input" id="formPermissionCode" placeholder="请输入权限编码">
                </div>
                <div class="form-group">
                    <label class="form-label">权限名称</label>
                    <input type="text" class="form-input" id="formPermissionName" placeholder="请输入权限名称">
                </div>
                <div class="form-group">
                    <label class="form-label">所属模块</label>
                    <input type="text" class="form-input" id="formModule" placeholder="请输入模块名称">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-input" id="formDescription" placeholder="请输入描述">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitAddPermission()">添加</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function closeModal() {
    document.querySelector('.modal-overlay')?.remove();
}

function submitAddPermission() {
    const permissionCode = document.getElementById('formPermissionCode').value;
    const permissionName = document.getElementById('formPermissionName').value;
    const module = document.getElementById('formModule').value;
    const description = document.getElementById('formDescription').value;
    
    if (!permissionCode || !permissionName) {
        alert('请填写必填信息');
        return;
    }
    
    apiPost('/permission', { permissionCode, permissionName, module, description }).then(res => {
        alert('添加成功');
        closeModal();
        loadPermissionData(1);
    }).catch(err => {
        alert('添加失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}

function editPermission(id) {
    apiGet('/permission/' + id).then(res => {
        const data = res.data;
        const modal = document.createElement('div');
        modal.className = 'modal-overlay active';
        modal.innerHTML = `
            <div class="modal">
                <div class="modal-header">
                    <span class="modal-title">编辑权限</span>
                    <button class="modal-close" onclick="closeModal()">×</button>
                </div>
                <div>
                    <div class="form-group">
                        <label class="form-label">权限名称</label>
                        <input type="text" class="form-input" id="editPermissionName" value="${data.permissionName || ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">所属模块</label>
                        <input type="text" class="form-input" id="editModule" value="${data.module || ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" class="form-input" id="editDescription" value="${data.description || ''}">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="submitEditPermission(${id})">保存</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    });
}

function submitEditPermission(id) {
    apiPut('/permission/' + id, {
        permissionName: document.getElementById('editPermissionName').value,
        module: document.getElementById('editModule').value,
        description: document.getElementById('editDescription').value
    }).then(res => {
        alert('修改成功');
        closeModal();
        loadPermissionData(1);
    }).catch(err => {
        alert('修改失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}

function deletePermission(id) {
    if (!confirm('确定要删除这个权限吗？')) return;
    
    apiDelete('/permission/' + id).then(res => {
        alert('删除成功');
        loadPermissionData(1);
    }).catch(err => {
        alert('删除失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}
</script>
