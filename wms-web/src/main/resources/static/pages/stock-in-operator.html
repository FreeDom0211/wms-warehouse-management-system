<div class="page-container">
    <div class="layui-card">
        <div class="layui-card-header">
            <span>入库管理</span>
            <button class="layui-btn layui-btn-sm" id="createBtn">创建入库单</button>
        </div>
        <div class="layui-card-body">
            <table class="layui-table" id="stockInTable" lay-filter="stockInTable"></table>
        </div>
    </div>
</div>

<script>
window.initStockIn = function() {
    layui.use(['table', 'layer', 'form'], function(){
        var table = layui.table;
        var layer = layui.layer;
        var form = layui.form;
        var currentUserId = 3;

        table.render({
            elem: '#stockInTable',
            url: '/api/stock-in/operator/' + currentUserId,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            page: true,
            cols: [[
                {field:'id', title:'ID', width:80},
                {field:'stockInNo', title:'入库单号', width:150},
                {field:'productName', title:'商品', width:180},
                {field:'batchNo', title:'批次号', width:120},
                {field:'locationCode', title:'货位', width:100},
                {field:'quantity', title:'数量', width:80},
                {field:'status', title:'状态', width:100},
                {field:'createTime', title:'创建时间', width:180},
                {title:'操作', width:150, toolbar:'#stockInBar'}
            ]]
        });

        table.on('tool(stockInTable)', function(obj){
            if(obj.event === 'complete'){
                apiPut('/stock-in/' + obj.data.id + '/complete').then(res => {
                    layer.msg('入库完成');
                    table.reload('stockInTable');
                });
            }
        });

        document.getElementById('createBtn').onclick = function(){
            layer.open({
                title: '创建入库单',
                type: 1,
                area: ['500px', '400px'],
                content: `
                    <div class="layui-form" style="padding:20px;">
                        <div class="layui-form-item">
                            <label>商品</label>
                            <select name="productId" class="layui-input"></select>
                        </div>
                        <div class="layui-form-item">
                            <label>批次号</label>
                            <input type="text" name="batchNo" class="layui-input">
                        </div>
                        <div class="layui-form-item">
                            <label>货位</label>
                            <select name="locationId" class="layui-input"></select>
                        </div>
                        <div class="layui-form-item">
                            <label>数量</label>
                            <input type="number" name="quantity" class="layui-input">
                        </div>
                    </div>
                `,
                btn: ['提交', '取消'],
                yes: function(index){
                    layer.close(index);
                    layer.msg('创建成功');
                }
            });
        };
    });
}
</script>
<script type="text/html" id="stockInBar">
    <a class="layui-btn layui-btn-xs" lay-event="complete">完成入库</a>
</script>
