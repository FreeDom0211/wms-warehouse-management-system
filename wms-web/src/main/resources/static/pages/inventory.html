<div class="card">
    <div class="card-header">
        <span class="card-title">📦 库存监控</span>
        <button class="btn btn-primary" onclick="refreshInventory()">🔄 刷新</button>
    </div>
    <div class="card-body">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px;">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #A8E6CF, #6BCB77);">📦</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalStock">-</div>
                    <div class="stat-label">库存总量</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #87CEEB, #5BA8C7);">📉</div>
                <div class="stat-content">
                    <div class="stat-value" id="lowStock">-</div>
                    <div class="stat-label">库存不足</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #FFB6C1, #FF9EB0);">🔥</div>
                <div class="stat-content">
                    <div class="stat-value" id="hotItems">-</div>
                    <div class="stat-label">热销商品</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #DDA0DD, #C9A0DC);">⏰</div>
                <div class="stat-content">
                    <div class="stat-value" id="expiredItems">-</div>
                    <div class="stat-label">临期商品</div>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>商品名称</th>
                        <th>规格型号</th>
                        <th>库存数量</th>
                        <th>预警阈值</th>
                        <th>仓库</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr><td colspan="6" style="text-align:center; padding:40px;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<style>
    .stat-card {
        background: white;
        border-radius: 20px;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.06), -4px -4px 8px rgba(255, 255, 255, 0.8);
    }
    .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.1);
    }
    .stat-value {
        font-size: 26px;
        font-weight: 800;
        color: #3D405B;
    }
    .stat-label {
        font-size: 12px;
        color: #8B8B8B;
        font-weight: 600;
    }
</style>

<script>
(function() {
    refreshInventory();
})();

function refreshInventory() {
    apiGet('/product/stock').then(res => {
        const data = res.data || [];
        renderInventoryTable(data);
        updateStats(data);
    }).catch(err => {
        console.error('加载库存数据失败:', err);
        document.getElementById('inventoryTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">加载失败</td></tr>';
    });
}

function renderInventoryTable(data) {
    const tbody = document.getElementById('inventoryTableBody');
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">暂无库存数据</td></tr>';
        return;
    }
    
    tbody.innerHTML = data.map(item => {
        const isLow = item.quantity < (item.warningThreshold || 10);
        const status = isLow ? 'warning' : 'normal';
        return `
            <tr>
                <td>${item.productName || '-'}</td>
                <td>${item.specification || '-'}</td>
                <td style="font-weight:700;">${item.quantity || 0}</td>
                <td>${item.warningThreshold || 10}</td>
                <td>${item.warehouseName || '-'}</td>
                <td>
                    <span style="padding:4px 12px; border-radius:12px; font-size:12px; font-weight:600; background: ${isLow ? '#FFE0E0' : '#E8F5E9'}; color: ${isLow ? '#C62828' : '#2E7D32'};">
                        ${isLow ? '库存不足' : '正常'}
                    </span>
                </td>
            </tr>
        `;
    }).join('');
}

function updateStats(data) {
    const total = data.reduce((sum, item) => sum + (item.quantity || 0), 0);
    const lowStock = data.filter(item => (item.quantity || 0) < (item.warningThreshold || 10)).length;
    const hotItems = data.filter(item => item.isHot).length;
    const expiredItems = data.filter(item => item.isExpired).length;
    
    document.getElementById('totalStock').textContent = total;
    document.getElementById('lowStock').textContent = lowStock;
    document.getElementById('hotItems').textContent = hotItems;
    document.getElementById('expiredItems').textContent = expiredItems;
}
</script>
