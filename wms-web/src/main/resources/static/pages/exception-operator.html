<div class="card">
    <div class="card-header">
        <span class="card-title">⚠️ 异常处理</span>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table class="data-table" id="exceptionTable">
                <thead>
                    <tr>
                        <th>异常ID</th>
                        <th>异常单号</th>
                        <th>异常类型</th>
                        <th>关联单号</th>
                        <th>状态</th>
                        <th>描述</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="exceptionTableBody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
(function() {
    loadExceptionData(1);
})();

function loadExceptionData(page) {
    apiGet('/exception', { pageNum: page, pageSize: 10 }).then(res => {
        if (!res || !res.data) {
            renderTable([]);
            renderPagination(page, 0);
            return;
        }
        const pageData = res.data;
        const records = pageData.records || pageData.list || [];
        const total = pageData.total || pageData.count || 0;
        renderTable(records);
        renderPagination(page, Math.ceil(total / 10));
    }).catch(err => {
        console.error('加载异常数据失败:', err);
        renderTable([]);
        renderPagination(page, 0);
    });
}

function renderTable(records) {
    const tbody = document.getElementById('exceptionTableBody');
    if (!tbody) return;
    
    if (!records || records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">暂无异常数据</td></tr>';
        return;
    }
    
    tbody.innerHTML = records.map(item => `
        <tr>
            <td>${item.id}</td>
            <td>${item.exceptionNo || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getTypeStyle(item.exceptionType || item.type)}">
                    ${getTypeText(item.exceptionType || item.type)}
                </span>
            </td>
            <td>${item.relatedNo || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getStatusStyle(item.status)}">
                    ${getStatusText(item.status)}
                </span>
            </td>
            <td>${item.description ? item.description.replace(/null/g, '-') : '-'}</td>
            <td>${formatDate(item.createTime)}</td>
            <td>
                ${item.status === 'PENDING' ? `
                    <button class="btn btn-primary" style="padding:8px 16px; font-size:12px;" onclick="handleException(${item.id})">处理</button>
                ` : '-'}
            </td>
        </tr>
    `).join('');
}

function getTypeText(type) {
    const map = { 
        'QUANTITY_MISMATCH': '数量不符', 
        'DAMAGED': '货物损坏', 
        'MISSING': '货物丢失',
        'OTHER': '其他异常',
        'DIFF': '库存差异',
        'DAMAGE': '商品损坏',
        'LOCATION_ABNORMAL': '货位异常',
        'INVENTORY_DIFF': '库存差异'
    };
    return map[type] || type;
}

function getTypeStyle(type) {
    const map = {
        'QUANTITY_MISMATCH': 'background: #E6F4FA; color: #4A90A4;',
        'DAMAGED': 'background: #FFEEEF; color: #8B4557;',
        'MISSING': 'background: #FFF8E8; color: #A08040;',
        'OTHER': 'background: #F5F0E8; color: #6B6B6B;',
        'DIFF': 'background: #E6F4FA; color: #4A90A4;',
        'DAMAGE': 'background: #FFEEEF; color: #8B4557;',
        'LOCATION_ABNORMAL': 'background: #FFF8E8; color: #A08040;',
        'INVENTORY_DIFF': 'background: #E6F4FA; color: #4A90A4;'
    };
    return map[type] || 'background: #F5F0E8; color: #6B6B6B;';
}

function getStatusText(status) {
    const map = { 
        'PENDING': '待处理', 
        'HANDLED': '已处理', 
        'CANCELLED': '已取消',
        'COMPLETED': '已完成'
    };
    return map[status] || status;
}

function getStatusStyle(status) {
    if (status === 'PENDING') return 'background: #FFEEEF; color: #8B4557;';
    if (status === 'HANDLED') return 'background: #E8F8ED; color: #2D5A3D;';
    if (status === 'COMPLETED') return 'background: #E8F8ED; color: #2D5A3D;';
    return 'background: #F5F0E8; color: #6B6B6B;';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

function renderPagination(currentPage, totalPages) {
    const pagination = document.getElementById('pagination');
    if (!pagination || totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadExceptionData(${currentPage - 1})">‹</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            html += `<button class="page-btn active">${i}</button>`;
        } else {
            html += `<button class="page-btn" onclick="loadExceptionData(${i})">${i}</button>`;
        }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadExceptionData(${currentPage + 1})">›</button>`;
    
    pagination.innerHTML = html;
}

function handleException(id) {
    const result = prompt('请输入处理说明：');
    if (!result) {
        return;
    }
    
    const userStr = localStorage.getItem('user');
    const currentUserId = userStr ? JSON.parse(userStr).id : 3;
    
    apiPut('/exception/' + id + '/handle', { handlerId: currentUserId, result }).then(res => {
        alert('异常已处理');
        loadExceptionData(1);
    }).catch(err => {
        alert('处理失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}
</script>
