<div class="page-container">
    <div class="layui-card">
        <div class="layui-card-header">
            <span style="font-size: 16px; font-weight: bold;">操作日志</span>
        </div>
        <div class="layui-card-body">
            <div class="layui-form-item" style="margin-bottom: 20px; padding: 15px; background-color: #f9f9f9; border-radius: 4px;">
                <div class="layui-inline" style="margin-right: 20px;">
                    <label class="layui-form-label" style="width: 60px;">操作员</label>
                    <div class="layui-input-inline" style="width: 180px;">
                        <input type="text" id="operatorName" class="layui-input" placeholder="请输入操作员">
                    </div>
                </div>
                <div class="layui-inline" style="margin-right: 20px;">
                    <label class="layui-form-label" style="width: 60px;">开始时间</label>
                    <div class="layui-input-inline" style="width: 180px;">
                        <input type="text" id="startTime" class="layui-input" placeholder="请选择开始时间">
                    </div>
                </div>
                <div class="layui-inline" style="margin-right: 20px;">
                    <label class="layui-form-label" style="width: 60px;">结束时间</label>
                    <div class="layui-input-inline" style="width: 180px;">
                        <input type="text" id="endTime" class="layui-input" placeholder="请选择结束时间">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn layui-btn-primary" onclick="queryLogs()">
                        <i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
            </div>
            <table class="layui-table" id="logTable"></table>
        </div>
    </div>
</div>

<script>
window.initLogPage = function() {
    layui.use(['table', 'form'], function(){
        var table = layui.table;
        var form = layui.form;
        
        table.render({
            elem: '#logTable',
            url: '/api/log',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            page: true,
            height: 'full-200',
            cols: [[
                {field:'id', title:'ID', width:80, align:'center'},
                {field:'operatorName', title:'操作员', width:120, align:'center'},
                {field:'module', title:'模块', width:120, align:'center'},
                {field:'operation', title:'操作类型', width:120, align:'center'},
                {field:'method', title:'方法', width:150, align:'center'},
                {field:'params', title:'参数', width:200},
                {field:'result', title:'结果', width:100, align:'center'},
                {field:'ip', title:'IP', width:150, align:'center'},
                {field:'createTime', title:'操作时间', width:180, align:'center'}
            ]]
        });
    });
}

function queryLogs(){
    layui.use(['table'], function(){
        var table = layui.table;
        table.reload('logTable', {
            where: {
                operatorName: document.getElementById('operatorName').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value
            }
        });
    });
}
</script>
