<div class="page-container">
    <div class="layui-row layui-col-space20">
        <div class="layui-col-md6">
            <div class="layui-card">
                <div class="layui-card-header">
                    <span>上报异常</span>
                </div>
                <div class="layui-card-body">
                    <div class="layui-form">
                        <div class="layui-form-item">
                            <label>异常类型</label>
                            <select id="abnormalType" class="layui-input">
                                <option value="DAMAGE">商品损坏</option>
                                <option value="LOCATION_ABNORMAL">货位异常</option>
                                <option value="INVENTORY_DIFF">库存差异</option>
                                <option value="OTHER">其他</option>
                            </select>
                        </div>
                        <div class="layui-form-item">
                            <label>关联商品</label>
                            <select id="productId" class="layui-input"></select>
                        </div>
                        <div class="layui-form-item">
                            <label>关联货位</label>
                            <select id="locationId" class="layui-input"></select>
                        </div>
                        <div class="layui-form-item">
                            <label>异常描述</label>
                            <textarea id="description" class="layui-textarea"></textarea>
                        </div>
                        <button class="layui-btn" onclick="submitAbnormal()">提交异常</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md6">
            <div class="layui-card">
                <div class="layui-card-header">我的异常记录</div>
                <div class="layui-card-body">
                    <table class="layui-table" id="abnormalTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
window.initException = function() {
    layui.use(['table'], function(){
        var table = layui.table;
        var currentUserId = 3;

        table.render({
            elem: '#abnormalTable',
            url: '/api/abnormal/operator/' + currentUserId,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            page: true,
            cols: [[
                {field:'id', title:'ID', width:80},
                {field:'type', title:'类型', width:100},
                {field:'status', title:'状态', width:100},
                {field:'description', title:'描述', width:200},
                {field:'createTime', title:'上报时间', width:180}
            ]]
        });
    });
}

function submitAbnormal(){
    var data = {
        type: document.getElementById('abnormalType').value,
        productId: document.getElementById('productId').value,
        locationId: document.getElementById('locationId').value,
        description: document.getElementById('description').value
    };
    apiPost('/abnormal', data).then(res => {
        layui.use(['layer', 'table'], function(){
            var layer = layui.layer;
            var table = layui.table;
            layer.msg('异常已上报');
            document.getElementById('description').value = '';
            table.reload('abnormalTable');
        });
    });
}
</script>
