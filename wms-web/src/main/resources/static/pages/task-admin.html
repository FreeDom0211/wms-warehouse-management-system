<div class="card">
    <div class="card-header">
        <span class="card-title">📋 任务调度</span>
        <button class="btn btn-primary" onclick="showCreateTaskModal()">+ 创建任务</button>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table class="data-table" id="taskTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>任务编号</th>
                        <th>任务类型</th>
                        <th>关联单号</th>
                        <th>状态</th>
                        <th>操作员</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
(function() {
    loadTaskData(1);
})();

function loadTaskData(page) {
    apiGet('/task', { pageNum: page, pageSize: 10 }).then(res => {
        if (!res || !res.data) {
            renderTaskTable([]);
            renderTaskPagination(page, 0);
            return;
        }
        const pageData = res.data;
        const records = pageData.records || pageData.list || [];
        const total = pageData.total || pageData.count || 0;
        renderTaskTable(records);
        renderTaskPagination(page, Math.ceil(total / 10));
    }).catch(err => {
        console.error('加载数据失败:', err);
        renderTaskTable([]);
        renderTaskPagination(page, 0);
    });
}

function renderTaskTable(records) {
    const tbody = document.getElementById('taskTableBody');
    if (!tbody) return;
    
    if (!records || records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">暂无数据</td></tr>';
        return;
    }
    
    tbody.innerHTML = records.map(item => `
        <tr>
            <td>${item.id}</td>
            <td>${item.taskNo || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getTypeStyle(item.taskType)}">
                    ${getTypeText(item.taskType)}
                </span>
            </td>
            <td>${item.refNo || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getStatusStyle(item.status)}">
                    ${getStatusText(item.status)}
                </span>
            </td>
            <td>${item.operatorName || '-'}</td>
            <td>${formatDate(item.createTime)}</td>
            <td>
                ${item.status === 'PENDING' ? `<button class="btn btn-primary" style="padding:6px 12px; font-size:12px;" onclick="assignTask(${item.id})">分配</button>` : '-'}
            </td>
        </tr>
    `).join('');
}

function getTypeText(type) {
    const map = { 'STOCK_IN': '入库', 'STOCK_OUT': '出库', 'INVENTORY_CHECK': '盘点' };
    return map[type] || type;
}

function getTypeStyle(type) {
    if (type === 'STOCK_IN') return 'background: #E8F8ED; color: #2D5A3D;';
    if (type === 'STOCK_OUT') return 'background: #E8F4FD; color: #2D5A7D;';
    return 'background: #FFF7E6; color: #8B6914;';
}

function getStatusText(status) {
    const map = { 'PENDING': '待处理', 'IN_PROGRESS': '进行中', 'COMPLETED': '已完成', 'CANCELLED': '已取消' };
    return map[status] || status;
}

function getStatusStyle(status) {
    if (status === 'PENDING') return 'background: #FFEEEF; color: #8B4557;';
    if (status === 'IN_PROGRESS') return 'background: #E8F4FD; color: #2D5A7D;';
    if (status === 'COMPLETED') return 'background: #E8F8ED; color: #2D5A3D;';
    return 'background: #F5F0E8; color: #6B6B6B;';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

function renderTaskPagination(currentPage, totalPages) {
    const pagination = document.getElementById('pagination');
    if (!pagination || totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadTaskData(${currentPage - 1})">‹</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            html += `<button class="page-btn active">${i}</button>`;
        } else {
            html += `<button class="page-btn" onclick="loadTaskData(${i})">${i}</button>`;
        }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadTaskData(${currentPage + 1})">›</button>`;
    
    pagination.innerHTML = html;
}

function showCreateTaskModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay active';
    modal.innerHTML = `
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">创建任务</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div>
                <div class="form-group">
                    <label class="form-label">任务类型</label>
                    <select class="form-input" id="formTaskType">
                        <option value="STOCK_IN">入库任务</option>
                        <option value="STOCK_OUT">出库任务</option>
                        <option value="INVENTORY_CHECK">盘点任务</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">关联单号</label>
                    <input type="text" class="form-input" id="formRefNo" placeholder="请输入关联单号">
                </div>
                <div class="form-group">
                    <label class="form-label">操作员ID</label>
                    <input type="number" class="form-input" id="formOperatorId" placeholder="请输入操作员ID">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitCreateTask()">创建</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function closeModal() {
    document.querySelector('.modal-overlay')?.remove();
}

function submitCreateTask() {
    const taskType = document.getElementById('formTaskType').value;
    const refNo = document.getElementById('formRefNo').value;
    const operatorId = document.getElementById('formOperatorId').value;
    
    apiPost('/task', {
        taskType,
        refNo,
        operatorId: operatorId ? parseInt(operatorId) : null
    }).then(res => {
        alert('创建成功');
        closeModal();
        loadTaskData(1);
    }).catch(err => {
        alert('创建失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}

function assignTask(taskId) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay active';
    modal.innerHTML = `
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">分配任务</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div>
                <div class="form-group">
                    <label class="form-label">操作员ID</label>
                    <input type="number" class="form-input" id="assignOperatorId" placeholder="请输入操作员ID">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitAssignTask(${taskId})">确认分配</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function submitAssignTask(taskId) {
    const operatorId = document.getElementById('assignOperatorId').value;
    if (!operatorId) {
        alert('请输入操作员ID');
        return;
    }
    
    apiPut('/task/' + taskId + '/assign', { operatorId: parseInt(operatorId) }).then(res => {
        alert('分配成功');
        closeModal();
        loadTaskData(1);
    }).catch(err => {
        alert('分配失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}
</script>
