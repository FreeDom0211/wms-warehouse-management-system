<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据备份与恢复 - 管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.11/dist/css/layui.css">
    <style>
        .backup-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn-group { display: flex; gap: 10px; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .status-badge.SUCCESS { background: #e8f5e9; color: #2e7d32; }
        .status-badge.FAILED { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div class="layui-container" style="padding: 20px;">
        <div class="backup-card">
            <div class="layui-card-header">
                <span>数据备份与恢复</span>
            </div>
            <div class="layui-card-body">
                <div class="btn-group">
                    <button class="layui-btn layui-btn-normal" id="manualBackupBtn">
                        <i class="layui-icon">📥</i> 立即备份
                    </button>
                    <button class="layui-btn layui-btn-danger" id="restoreBtn">
                        <i class="layui-icon">📤</i> 数据恢复
                    </button>
                </div>
            </div>
        </div>

        <div class="backup-card">
            <div class="layui-card-header">
                <span>备份历史（最近30天）</span>
                <div class="layui-card-header-right">
                    <button class="layui-btn layui-btn-sm" id="refreshBtn">刷新</button>
                </div>
            </div>
            <div class="layui-card-body">
                <table class="layui-table" id="backupTable" lay-filter="backupTable"></table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.11/dist/layui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script>
        layui.use(['table', 'layer', 'form'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;

            initTable();

            document.getElementById('refreshBtn').onclick = function(){
                table.reload('backupTableId');
            };

            document.getElementById('manualBackupBtn').onclick = function(){
                layer.confirm('确认执行手动备份?', function(index){
                    layer.close(index);
                    layer.load(2);
                    axios.post('/admin/backup/manual', {operatorId: 1}).then(res => {
                        layer.closeAll('loading');
                        if(res.data.data.success){
                            layer.msg('备份成功', {icon: 1});
                            table.reload('backupTableId');
                            
                            setTimeout(function(){
                                var fileName = res.data.data.fileName;
                                window.location.href = '/admin/backup/download/' + fileName;
                            }, 1000);
                        } else {
                            layer.msg('备份失败', {icon: 2});
                        }
                    }).catch(err => {
                        layer.closeAll('loading');
                        layer.msg('备份失败: ' + (err.response.data.msg || err.message), {icon: 2});
                    });
                });
            };

            document.getElementById('restoreBtn').onclick = function(){
                showRestoreModal();
            };

            function initTable(){
                table.render({
                    elem: '#backupTable',
                    url: '/admin/backup/history?days=30',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    page: true,
                    cols: [[
                        {field:'id', title:'ID', width:80},
                        {field:'backupTypeLabel', title:'备份类型', width:120},
                        {field:'fileName', title:'备份文件名', width:250},
                        {field:'fileSize', title:'文件大小', width:100},
                        {field:'status', title:'状态', width:100, templet:function(d){
                            return '<span class="status-badge ' + d.status + '">' + d.statusLabel + '</span>';
                        }},
                        {field:'errorMessage', title:'错误信息', width:300},
                        {field:'createTime', title:'备份时间', width:180},
                        {title:'操作', width:150, toolbar:'#backupBar'}
                    ]],
                    id: 'backupTableId'
                });

                table.on('tool(backupTable)', function(obj){
                    var data = obj.data;
                    if(obj.event === 'download'){
                        window.location.href = '/admin/backup/download/' + data.fileName;
                    } else if(obj.event === 'delete'){
                        layer.confirm('确认删除该备份记录?', function(index){
                            axios.delete('/admin/backup/' + data.id).then(res => {
                                layer.msg('删除成功');
                                table.reload('backupTableId');
                            });
                            layer.close(index);
                        });
                    }
                });
            }

            function showRestoreModal(){
                var verifyCode = '';
                axios.post('/admin/backup/generate-code').then(res => {
                    verifyCode = res.data.data;
                    layer.open({
                        title: '数据恢复',
                        type: 1,
                        area: ['500px', '350px'],
                        content: `
                            <div class="layui-form" style="padding:20px;">
                                <div class="layui-form-item">
                                    <label class="layui-form-label">验证码</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="verifyCode" class="layui-input" placeholder="请输入验证码">
                                        <div style="color:#f44336;margin-top:5px;font-size:12px;">验证码: ${verifyCode}</div>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label">备份文件</label>
                                    <div class="layui-input-block">
                                        <button type="button" class="layui-btn layui-btn-normal" id="fileBtn">
                                            <i class="layui-icon">📁</i> 选择.sql文件
                                        </button>
                                        <input type="file" id="fileInput" accept=".sql" style="display:none;">
                                        <div id="fileInfo" style="margin-top:10px;color:#666;"></div>
                                    </div>
                                </div>
                                <div class="layui-form-item" style="color:#f44336;font-size:12px;">
                                    <strong>警告:</strong> 数据恢复将覆盖当前数据库所有数据，请确保已备份！
                                </div>
                            </div>
                        `,
                        btn: ['确认恢复', '取消'],
                        yes: function(index, layero){
                            var code = layero.find('input[name="verifyCode"]').val();
                            var fileInput = layero.find('#fileInput')[0];
                            
                            if(!code){
                                layer.msg('请输入验证码');
                                return;
                            }
                            
                            if(!fileInput.files || fileInput.files.length === 0){
                                layer.msg('请选择备份文件');
                                return;
                            }
                            
                            var formData = new FormData();
                            formData.append('file', fileInput.files[0]);
                            formData.append('verifyCode', code);
                            
                            layer.close(index);
                            layer.load(2);
                            
                            axios.post('/admin/backup/restore', formData, {
                                headers: {'Content-Type': 'multipart/form-data'}
                            }).then(res => {
                                layer.closeAll('loading');
                                layer.msg('数据恢复成功', {icon: 1});
                                table.reload('backupTableId');
                            }).catch(err => {
                                layer.closeAll('loading');
                                layer.msg('恢复失败: ' + (err.response.data.msg || err.message), {icon: 2});
                            });
                        },
                        success: function(layero){
                            layero.find('#fileBtn').click(function(){
                                layero.find('#fileInput').click();
                            });
                            
                            layero.find('#fileInput').change(function(e){
                                var file = e.target.files[0];
                                if(file){
                                    layero.find('#fileInfo').text('已选择: ' + file.name + ' (' + formatFileSize(file.size) + ')');
                                }
                            });
                        }
                    });
                });
            }

            function formatFileSize(size){
                if(size < 1024) return size + ' B';
                if(size < 1024 * 1024) return (size / 1024).toFixed(2) + ' KB';
                return (size / (1024 * 1024)).toFixed(2) + ' MB';
            }
        });
    </script>
    <script type="text/html" id="backupBar">
        <a class="layui-btn layui-btn-xs" lay-event="download">下载</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
    </script>
</body>
</html>
