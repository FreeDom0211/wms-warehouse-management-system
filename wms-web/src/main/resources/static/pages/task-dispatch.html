<div class="page-container">
    <div class="layui-row layui-col-space20">
        <div class="layui-col-md3">
            <div class="layui-card" style="text-align:center;">
                <div class="layui-card-body">
                    <div class="stat-number" style="color:#666;" id="totalCount">0</div>
                    <div style="color:#666;">总任务数</div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card" style="text-align:center;">
                <div class="layui-card-body">
                    <div class="stat-number" style="color:#f44336;" id="pendingCount">0</div>
                    <div style="color:#666;">待分配</div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card" style="text-align:center;">
                <div class="layui-card-body">
                    <div class="stat-number" style="color:#ff9800;" id="processingCount">0</div>
                    <div style="color:#666;">进行中</div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card" style="text-align:center;">
                <div class="layui-card-body">
                    <div class="stat-number" style="color:#4caf50;" id="completedCount">0</div>
                    <div style="color:#666;">已完成</div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-card">
        <div class="layui-card-header">
            <span>待分配任务</span>
            <div class="layui-card-header-right">
                <button class="layui-btn layui-btn-sm" id="batchAssignBtn">批量分配</button>
                <button class="layui-btn layui-btn-sm" id="refreshBtn">刷新</button>
            </div>
        </div>
        <div class="layui-card-body">
            <div class="filter-bar" style="margin-bottom: 15px; padding: 15px; background: #f5f5f5; border-radius: 6px;">
                <div class="layui-form layui-form-pane">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">任务类型</label>
                            <div class="layui-input-inline" style="width: 120px;">
                                <select id="filterType">
                                    <option value="">全部</option>
                                    <option value="STOCK_IN">入库</option>
                                    <option value="STOCK_OUT">出库</option>
                                    <option value="INVENTORY_CHECK">盘点</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">优先级</label>
                            <div class="layui-input-inline" style="width: 100px;">
                                <select id="filterPriority">
                                    <option value="">全部</option>
                                    <option value="1">高</option>
                                    <option value="2">中</option>
                                    <option value="3">低</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <button class="layui-btn layui-btn-sm" id="filterBtn">筛选</button>
                            <button class="layui-btn layui-btn-sm layui-btn-primary" id="resetBtn">重置</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="pendingTaskList"></div>
        </div>
    </div>

    <div class="layui-card">
        <div class="layui-card-header">
            <span>所有任务</span>
        </div>
        <div class="layui-card-body">
            <table class="layui-table" id="allTaskTable" lay-filter="allTaskTable"></table>
        </div>
    </div>
</div>

<script>
window.initTaskDispatch = function() {
    var operators = [];
    
    layui.use(['table', 'layer', 'form'], function(){
        var table = layui.table;
        var layer = layui.layer;
        var form = layui.form;

        loadOverview();
        loadPendingTasks();
        loadOperators();
        initTaskTable();

        document.getElementById('refreshBtn').onclick = function(){
            loadPendingTasks();
        };

        document.getElementById('filterBtn').onclick = function(){
            loadPendingTasks();
        };

        document.getElementById('resetBtn').onclick = function(){
            document.getElementById('filterType').value = '';
            document.getElementById('filterPriority').value = '';
            form.render();
            loadPendingTasks();
        };

        document.getElementById('batchAssignBtn').onclick = function(){
            showBatchAssignModal();
        };

        function loadOverview(){
            apiGet('/manager/task/overview').then(res => {
                var data = res.data;
                document.getElementById('totalCount').textContent = data.total || 0;
                document.getElementById('pendingCount').textContent = data.pending || 0;
                document.getElementById('processingCount').textContent = data.processing || 0;
                document.getElementById('completedCount').textContent = data.completed || 0;
            });
        }

        function loadPendingTasks(){
            var type = document.getElementById('filterType').value;
            var priority = document.getElementById('filterPriority').value;

            var url = '/manager/task/pending';
            var params = [];
            if(type) params.push('taskType=' + type);
            if(priority) params.push('priority=' + priority);
            if(params.length > 0) url += '?' + params.join('&');

            apiGet(url).then(res => {
                var tasks = res.data;
                var html = '';
                if(tasks.length === 0){
                    html = '<div style="text-align:center;padding:40px;color:#999;">暂无待分配任务</div>';
                } else {
                    tasks.forEach(task => {
                        var priorityClass = task.priority === 1 ? 'priority-high' : task.priority === 2 ? 'priority-medium' : 'priority-low';
                        html += '<div class="task-card ' + priorityClass + '" onclick="showAssignModal(' + task.id + ')">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                            '<div>' +
                            '<span class="task-type ' + task.taskType + '">' + task.typeLabel + '</span> ' +
                            '<strong style="margin-left:10px;">' + task.relatedNo + '</strong>' +
                            '</div>' +
                            '<div style="color:#999;font-size:12px;">' + formatTime(task.createTime) + '</div>' +
                            '</div>' +
                            '<div style="margin-top:8px;font-size:13px;color:#666;">优先级: ' + task.priorityLabel + ' | ' + (task.remark || '无备注') + '</div>' +
                            '</div>';
                    });
                }
                document.getElementById('pendingTaskList').innerHTML = html;
            });
        }

        function loadOperators(){
            apiGet('/manager/task/operators').then(res => {
                operators = res.data;
            });
        }

        function initTaskTable(){
            table.render({
                elem: '#allTaskTable',
                url: '/api/manager/task/list',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                page: true,
                cols: [[
                    {type: 'checkbox'},
                    {field:'id', title:'ID', width:80},
                    {field:'taskType', title:'任务类型', width:100, templet:function(d){
                        return '<span class="task-type ' + d.taskType + '">' + d.typeLabel + '</span>';
                    }},
                    {field:'relatedNo', title:'关联单号', width:150},
                    {field:'operatorName', title:'操作员', width:100},
                    {field:'priorityLabel', title:'优先级', width:80},
                    {field:'status', title:'状态', width:100, templet:function(d){
                        var color = d.status === 'PENDING' ? '#f44336' : d.status === 'PROCESSING' ? '#ff9800' : '#4caf50';
                        var label = d.status === 'PENDING' ? '待分配' : d.status === 'PROCESSING' ? '进行中' : '已完成';
                        return '<span style="color:' + color + ';">' + label + '</span>';
                    }},
                    {field:'createTime', title:'创建时间', width:180},
                    {title:'操作', width:200, toolbar:'#taskBar'}
                ]]
            });

            table.on('tool(allTaskTable)', function(obj){
                var data = obj.data;
                if(obj.event === 'assign'){
                    showAssignModal(data.id);
                } else if(obj.event === 'reassign'){
                    showReassignModal(data.id);
                } else if(obj.event === 'priority'){
                    showPriorityModal(data.id);
                }
            });
        }

        window.showAssignModal = function(taskId){
            var operatorOptions = operators.map(op =>
                '<option value="' + op.id + '">' + op.name + ' (' + op.workNo + ')</option>'
            ).join('');

            layer.open({
                title: '分配任务',
                type: 1,
                area: ['400px', '300px'],
                content: `
                    <div class="layui-form" style="padding:20px;">
                        <div class="layui-form-item">
                            <label class="layui-form-label">选择操作员</label>
                            <div class="layui-input-block">
                                <select name="operatorId" class="layui-input">${operatorOptions}</select>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">优先级</label>
                            <div class="layui-input-block">
                                <select name="priority" class="layui-input">
                                    <option value="1">高</option>
                                    <option value="2" selected>中</option>
                                    <option value="3">低</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `,
                btn: ['分配', '取消'],
                yes: function(index, layero){
                    var operatorId = layero.find('select[name="operatorId"]').val();
                    var priority = layero.find('select[name="priority"]').val();
                    apiPost('/manager/task/assign', {
                        taskId: taskId,
                        operatorId: parseInt(operatorId),
                        priority: parseInt(priority)
                    }).then(res => {
                        layer.msg('分配成功');
                        layer.close(index);
                        loadPendingTasks();
                        table.reload('allTaskTable');
                    });
                }
            });
        };

        window.showReassignModal = function(taskId){
            var operatorOptions = operators.map(op =>
                '<option value="' + op.id + '">' + op.name + ' (' + op.workNo + ')</option>'
            ).join('');

            layer.open({
                title: '重新分配任务',
                type: 1,
                area: ['400px', '200px'],
                content: `
                    <div class="layui-form" style="padding:20px;">
                        <div class="layui-form-item">
                            <label class="layui-form-label">新操作员</label>
                            <div class="layui-input-block">
                                <select name="newOperatorId" class="layui-input">${operatorOptions}</select>
                            </div>
                        </div>
                    </div>
                `,
                btn: ['重新分配', '取消'],
                yes: function(index, layero){
                    var newOperatorId = layero.find('select[name="newOperatorId"]').val();
                    apiPost('/manager/task/reassign', {
                        taskId: taskId,
                        newOperatorId: parseInt(newOperatorId)
                    }).then(res => {
                        layer.msg('重新分配成功');
                        layer.close(index);
                        table.reload('allTaskTable');
                    });
                }
            });
        };

        window.showPriorityModal = function(taskId){
            layer.prompt({title: '设置优先级(1:高 2:中 3:低)', value: '2'}, function(value, index){
                apiPost('/manager/task/priority', {
                    taskId: taskId,
                    priority: parseInt(value)
                }).then(res => {
                    layer.msg('优先级已更新');
                    layer.close(index);
                    loadPendingTasks();
                    table.reload('allTaskTable');
                });
            });
        };

        function showBatchAssignModal(){
            var checkStatus = table.checkStatus('allTaskTable');
            var selectedTasks = checkStatus.data;
            if(selectedTasks.length === 0){
                layer.msg('请先选择任务');
                return;
            }

            var taskIds = selectedTasks.map(t => t.id);
            var operatorOptions = operators.map(op =>
                '<option value="' + op.id + '">' + op.name + ' (' + op.workNo + ')</option>'
            ).join('');

            layer.open({
                title: '批量分配任务 (已选' + taskIds.length + '个)',
                type: 1,
                area: ['400px', '200px'],
                content: `
                    <div class="layui-form" style="padding:20px;">
                        <div class="layui-form-item">
                            <label class="layui-form-label">分配给</label>
                            <div class="layui-input-block">
                                <select name="operatorId" class="layui-input">${operatorOptions}</select>
                            </div>
                        </div>
                    </div>
                `,
                btn: ['批量分配', '取消'],
                yes: function(index, layero){
                    var operatorId = layero.find('select[name="operatorId"]').val();
                    apiPost('/manager/task/batch-assign', {
                        taskIds: taskIds,
                        operatorId: parseInt(operatorId)
                    }).then(res => {
                        layer.msg('批量分配成功');
                        layer.close(index);
                        loadPendingTasks();
                        table.reload('allTaskTable');
                    });
                }
            });
        }

        function formatTime(timeStr){
            if(!timeStr) return '';
            var date = new Date(timeStr);
            return (date.getMonth()+1) + '-' + date.getDate() + ' ' + date.getHours() + ':' + (date.getMinutes()<10?'0':'') + date.getMinutes();
        }
    });
}
</script>
<script type="text/html" id="taskBar">
    <a class="layui-btn layui-btn-xs" lay-event="assign">分配</a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="reassign">重分配</a>
    <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="priority">优先级</a>
</script>

<style>
.stat-number { font-size: 32px; font-weight: bold; }
.task-card { background: #f9f9f9; border-radius: 6px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; }
.task-card:hover { background: #f0f0f0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.task-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.task-type.STOCK_IN { background: #e8f5e9; color: #2e7d32; }
.task-type.STOCK_OUT { background: #fff3e0; color: #e65100; }
.task-type.INVENTORY_CHECK { background: #e3f2fd; color: #1565c0; }
.priority-high { border-left: 4px solid #f44336; }
.priority-medium { border-left: 4px solid #ff9800; }
.priority-low { border-left: 4px solid #4caf50; }
</style>
