<div class="card">
    <div class="card-header">
        <span class="card-title">📊 系统监控</span>
        <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
    </div>
    <div class="card-body">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px;">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #A8E6CF, #6BCB77);">📦</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalUsers">-</div>
                    <div class="stat-label">用户总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #87CEEB, #5BA8C7);">🏭</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalWarehouses">-</div>
                    <div class="stat-label">仓库总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #FFB6C1, #FF9EB0);">📋</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalTasks">-</div>
                    <div class="stat-label">任务总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(145deg, #FFF7E6, #FFE0B2);">📥</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalStockIn">-</div>
                    <div class="stat-label">入库单总数</div>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="card" style="padding: 20px;">
                <h3 style="font-weight: 800; color: #3D405B; margin-bottom: 16px; font-size: 16px;">📊 系统状态</h3>
                <div id="systemStatus">
                    <div style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #F5F0E8;">
                        <span style="color: #5B5B5B;">CPU 使用率</span>
                        <span style="font-weight: 700; color: #3D405B;" id="cpuUsage">-</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #F5F0E8;">
                        <span style="color: #5B5B5B;">内存使用</span>
                        <span style="font-weight: 700; color: #3D405B;" id="memoryUsage">-</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #F5F0E8;">
                        <span style="color: #5B5B5B;">磁盘空间</span>
                        <span style="font-weight: 700; color: #3D405B;" id="diskUsage">-</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 12px;">
                        <span style="color: #5B5B5B;">系统运行时间</span>
                        <span style="font-weight: 700; color: #3D405B;" id="uptime">-</span>
                    </div>
                </div>
            </div>

            <div class="card" style="padding: 20px;">
                <h3 style="font-weight: 800; color: #3D405B; margin-bottom: 16px; font-size: 16px;">🔔 最近登录</h3>
                <div id="recentLogins">
                    <div style="text-align: center; padding: 30px; color: #8B8B8B;">加载中...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .stat-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.06), -4px -4px 8px rgba(255, 255, 255, 0.8);
    }
    
    .stat-icon {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.1);
    }
    
    .stat-content {
        flex: 1;
    }
    
    .stat-value {
        font-size: 28px;
        font-weight: 800;
        color: #3D405B;
    }
    
    .stat-label {
        font-size: 13px;
        color: #8B8B8B;
        font-weight: 600;
    }
</style>

<script>
(function() {
    refreshData();
})();

function refreshData() {
    loadStatistics();
    loadSystemStatus();
    loadRecentLogins();
}

function loadStatistics() {
    apiGet('/statistics').then(res => {
        const data = res.data || {};
        document.getElementById('totalUsers').textContent = data.totalUsers || 0;
        document.getElementById('totalWarehouses').textContent = data.totalWarehouses || 0;
        document.getElementById('totalTasks').textContent = data.totalTasks || 0;
        document.getElementById('totalStockIn').textContent = data.totalStockIn || 0;
    }).catch(err => {
        console.error('加载统计数据失败:', err);
    });
}

function loadSystemStatus() {
    document.getElementById('cpuUsage').textContent = '正常';
    document.getElementById('memoryUsage').textContent = '正常';
    document.getElementById('diskUsage').textContent = '正常';
    document.getElementById('uptime').textContent = '运行中';
}

function loadRecentLogins() {
    apiGet('/admin/log/list').then(res => {
        const data = res.data || [];
        const html = data.length > 0 ? data.slice(0, 5).map(item => `
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F5F0E8;">
                <div>
                    <div style="font-weight: 700; color: #3D405B;">${item.operatorName || '-'}</div>
                    <div style="font-size: 12px; color: #8B8B8B;">${item.ipAddress || '-'}</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 12px; color: #8B8B8B;">${formatDate(item.createTime)}</div>
                </div>
            </div>
        `).join('') : '<div style="text-align: center; padding: 30px; color: #8B8B8B;">暂无数据</div>';
        document.getElementById('recentLogins').innerHTML = html;
    }).catch(err => {
        console.error('加载登录记录失败:', err);
        document.getElementById('recentLogins').innerHTML = '<div style="text-align: center; padding: 30px; color: #8B8B8B;">加载失败</div>';
    });
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}
</script>
