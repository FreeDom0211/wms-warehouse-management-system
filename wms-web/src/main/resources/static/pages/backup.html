<div class="card">
    <div class="card-header">
        <span class="card-title">💾 数据备份</span>
        <button class="btn btn-primary" onclick="createBackup()">+ 创建备份</button>
    </div>
    <div class="card-body">
        <div class="table-wrapper">
            <table class="data-table" id="backupTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>备份文件名</th>
                        <th>备份类型</th>
                        <th>大小</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="backupTableBody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
(function() {
    loadBackupData(1);
})();

function loadBackupData(page) {
    apiGet('/backup/list', { pageNum: page, pageSize: 10 }).then(res => {
        if (!res || !res.data) {
            renderBackupTable([]);
            renderBackupPagination(page, 0);
            return;
        }
        const pageData = res.data;
        const records = pageData.records || pageData.list || pageData || [];
        const total = pageData.total || pageData.count || records.length;
        renderBackupTable(records);
        renderBackupPagination(page, Math.ceil(total / 10));
    }).catch(err => {
        console.error('加载数据失败:', err);
        renderBackupTable([]);
        renderBackupPagination(page, 0);
    });
}

function renderBackupTable(records) {
    const tbody = document.getElementById('backupTableBody');
    if (!tbody) return;
    
    if (!records || records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">暂无数据</td></tr>';
        return;
    }
    
    tbody.innerHTML = records.map(item => `
        <tr>
            <td>${item.id}</td>
            <td>${item.fileName || '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; background: #E8F4FD; color: #2D5A7D;">
                    ${item.backupType === 'FULL' ? '完整备份' : '增量备份'}
                </span>
            </td>
            <td>${item.fileSize != null ? (item.fileSize / 1024 / 1024).toFixed(2) + ' MB' : '-'}</td>
            <td>
                <span style="padding:6px 14px; border-radius:16px; font-weight:700; font-size:13px; ${getStatusStyle(item.status)}">
                    ${item.status === 'SUCCESS' ? '成功' : '失败'}
                </span>
            </td>
            <td>${formatDate(item.createTime)}</td>
            <td>
                <button class="btn btn-primary" style="padding:6px 12px; font-size:12px; margin-right:6px;" onclick="downloadBackup(${item.id})">下载</button>
                <button class="btn btn-danger" style="padding:6px 12px; font-size:12px;" onclick="deleteBackup(${item.id})">删除</button>
            </td>
        </tr>
    `).join('');
}

function getStatusStyle(status) {
    return status === 'SUCCESS' ? 'background: #E8F8ED; color: #2D5A3D;' : 'background: #FFEEEF; color: #8B4557;';
}

function formatSize(bytes) {
    if (!bytes) return '-';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

function renderBackupPagination(currentPage, totalPages) {
    const pagination = document.getElementById('pagination');
    if (!pagination || totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }
    
    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="loadBackupData(${currentPage - 1})">‹</button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            html += `<button class="page-btn active">${i}</button>`;
        } else {
            html += `<button class="page-btn" onclick="loadBackupData(${i})">${i}</button>`;
        }
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadBackupData(${currentPage + 1})">›</button>`;
    
    pagination.innerHTML = html;
}

function createBackup() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay active';
    modal.innerHTML = `
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">创建备份</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div>
                <div class="form-group">
                    <label class="form-label">备份类型</label>
                    <select class="form-input" id="formBackupType">
                        <option value="FULL">完整备份</option>
                        <option value="INCREMENTAL">增量备份</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="submitCreateBackup()">确认备份</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

function closeModal() {
    document.querySelector('.modal-overlay')?.remove();
}

function submitCreateBackup() {
    const backupType = document.getElementById('formBackupType').value;
    
    apiPost('/backup', { backupType }).then(res => {
        alert('备份创建成功');
        closeModal();
        loadBackupData(1);
    }).catch(err => {
        alert('创建失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}

function downloadBackup(id) {
    const token = localStorage.getItem('token');
    window.open(`/backup/${id}/download?token=${token}`, '_blank');
}

function deleteBackup(id) {
    if (!confirm('确定要删除这个备份吗？')) return;
    
    apiDelete('/backup/' + id).then(res => {
        alert('删除成功');
        loadBackupData(1);
    }).catch(err => {
        alert('删除失败: ' + (err.response?.data?.msg || '未知错误'));
    });
}
</script>
