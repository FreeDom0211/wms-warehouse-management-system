<div class="page-container">
    <div class="layui-card">
        <div class="layui-card-header">
            <span>数据备份</span>
            <button class="layui-btn layui-btn-sm" id="backupBtn">立即备份</button>
        </div>
        <div class="layui-card-body">
            <table class="layui-table" id="backupTable" lay-filter="backupTable"></table>
        </div>
    </div>
</div>

<script>
window.initBackupPage = function() {
    layui.use(['table', 'layer'], function(){
        var table = layui.table;
        var layer = layui.layer;

        loadBackupList();

        document.getElementById('backupBtn').onclick = function(){
            layer.load(2);
            apiPost('/admin/backup/manual', {operatorId: 1}).then(res => {
                layer.closeAll('loading');
                if(res.data && res.data.success){
                    layer.msg('备份成功');
                    loadBackupList();
                } else {
                    layer.msg('备份失败');
                }
            }).catch(err => {
                layer.closeAll('loading');
                layer.msg('备份失败: ' + (err.response?.data?.msg || err.message || '未知错误'));
            });
        };

        function loadBackupList(){
            table.render({
                elem: '#backupTable',
                url: '/api/admin/backup/history?days=30',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                page: true,
                cols: [[
                    {field:'id', title:'ID', width:80},
                    {field:'fileName', title:'备份文件名', width:200},
                    {field:'fileSize', title:'文件大小', width:120},
                    {field:'backupTypeLabel', title:'备份类型', width:120},
                    {field:'status', title:'状态', width:100, templet:function(d){
                        return '<span class="status-badge ' + d.status + '">' + d.statusLabel + '</span>';
                    }},
                    {field:'errorMessage', title:'错误信息', width:200},
                    {field:'createTime', title:'备份时间', width:180},
                    {title:'操作', width:180, toolbar:'#backupBar'}
                ]],
                id: 'backupTableId'
            });
        }

        table.on('tool(backupTable)', function(obj){
            if(obj.event === 'download'){
                window.location.href = '/api/admin/backup/download/' + obj.data.fileName;
            } else if(obj.event === 'restore'){
                showRestoreModal(obj.data.fileName);
            } else if(obj.event === 'delete'){
                layer.confirm('确定删除该备份吗？', function(index){
                    apiDelete('/admin/backup/' + obj.data.id).then(res => {
                        layer.msg('删除成功');
                        table.reload('backupTableId');
                    }).catch(err => {
                        layer.msg('删除失败');
                    });
                    layer.close(index);
                });
            }
        });
    });
}

function showRestoreModal(fileName){
    layui.use(['layer'], function(){
        var layer = layui.layer;
        var verifyCode = '';
        
        apiPost('/admin/backup/generate-code').then(res => {
            verifyCode = res.data;
            layer.open({
                title: '数据恢复',
                type: 1,
                area: ['500px', '350px'],
                content: `
                    <div class="layui-form" style="padding:20px;">
                        <div class="layui-form-item">
                            <label class="layui-form-label">验证码</label>
                            <div class="layui-input-block">
                                <input type="text" name="verifyCode" class="layui-input" placeholder="请输入验证码">
                                <div style="color:#f44336;margin-top:5px;font-size:12px;">验证码: ${verifyCode}</div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">备份文件</label>
                            <div class="layui-input-block">
                                <input type="file" id="restoreFile" accept=".sql" style="display:none;">
                                <button type="button" class="layui-btn" onclick="document.getElementById('restoreFile').click()">选择备份文件</button>
                                <div id="selectedFile" style="margin-top:10px;color:#666;">${fileName}</div>
                            </div>
                        </div>
                        <div class="layui-form-item" style="color:#f44336;font-size:12px;">
                            <strong>警告:</strong> 数据恢复将覆盖当前数据库所有数据，请确保已备份！
                        </div>
                    </div>
                `,
                btn: ['确认恢复', '取消'],
                yes: function(index, layero){
                    var code = layero.find('input[name="verifyCode"]').val();
                    if(!code){
                        layer.msg('请输入验证码');
                        return;
                    }
                    
                    layer.close(index);
                    layer.load(2);
                    
                    apiPost('/admin/backup/restore', {fileName: fileName, verifyCode: code}).then(res => {
                        layer.closeAll('loading');
                        layer.msg('恢复成功');
                    }).catch(err => {
                        layer.closeAll('loading');
                        layer.msg('恢复失败: ' + (err.response?.data?.msg || '未知错误'));
                    });
                }
            });
        });
    });
}
</script>
<script type="text/html" id="backupBar">
    <a class="layui-btn layui-btn-xs" lay-event="download">下载</a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="restore">恢复</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
</script>
