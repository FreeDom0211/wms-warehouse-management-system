<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>京东仓储管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FDF8F3;
            min-height: 100vh;
            overflow: hidden;
        }
        
        :root {
            --mint: #A8E6CF;
            --mint-dark: #6BCB77;
            --mint-light: #C8F0D8;
            --pink: #FFB6C1;
            --pink-dark: #FF9EB0;
            --blue: #87CEEB;
            --cream: #FDF8F3;
            --cream-dark: #F5F0E8;
            --text-dark: #3D405B;
            --text-medium: #5B5B5B;
            --text-light: #8B8B8B;
            --white: #FFFFFF;
        }
        
        .layout-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 16px;
        }
        
        .header {
            background: white;
            height: 80px;
            border-radius: 28px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 
                12px 12px 28px rgba(0, 0, 0, 0.08),
                -6px -6px 14px rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 100;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            background: linear-gradient(145deg, #ffffff, #fafafa);
            border-radius: 24px;
            z-index: -1;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .logo-icon {
            font-size: 36px;
            color: var(--mint-dark);
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--cream-dark);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .user-info:hover {
            background: var(--mint-light);
            transform: translateY(-2px);
        }
        
        .user-icon {
            font-size: 20px;
            color: var(--mint-dark);
        }
        
        .user-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 15px;
        }
        
        .role-badge {
            padding: 6px 16px;
            background: linear-gradient(145deg, var(--mint), var(--mint-dark));
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            box-shadow: 
                4px 4px 8px rgba(168, 230, 207, 0.4),
                -2px -2px 4px rgba(255, 255, 255, 0.8);
        }
        
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border-radius: 20px;
            padding: 8px;
            min-width: 160px;
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.1),
                -4px -4px 8px rgba(255, 255, 255, 0.9);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            z-index: 200;
        }
        
        .user-section:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-item {
            padding: 14px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-medium);
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .dropdown-item:hover {
            background: var(--cream-dark);
            color: var(--mint-dark);
        }
        
        .main-content {
            flex: 1;
            display: flex;
            gap: 16px;
            overflow: hidden;
        }
        
        .sidebar {
            width: 220px;
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 
                12px 12px 28px rgba(0, 0, 0, 0.08),
                -6px -6px 14px rgba(255, 255, 255, 0.9);
            position: relative;
            overflow-y: auto;
        }
        
        .sidebar::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            background: linear-gradient(145deg, #ffffff, #fafafa);
            border-radius: 24px;
            z-index: -1;
        }
        
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .menu-item {
            margin-bottom: 8px;
        }
        
        .menu-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-medium);
            font-weight: 700;
            font-size: 15px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .menu-link:hover {
            background: var(--cream-dark);
            color: var(--mint-dark);
            transform: translateX(6px);
        }
        
        .menu-link.active {
            background: linear-gradient(145deg, var(--mint), var(--mint-dark));
            color: white;
            box-shadow: 
                10px 10px 20px rgba(168, 230, 207, 0.4),
                -5px -5px 10px rgba(255, 255, 255, 0.9);
            transform: translateX(8px);
        }
        
        .menu-icon {
            font-size: 18px;
        }
        
        .sub-menu {
            list-style: none;
            padding: 8px 0 8px 24px;
            margin: 0;
            display: none;
        }
        
        .sub-menu.active {
            display: block;
        }
        
        .sub-menu-item {
            margin-bottom: 4px;
        }
        
        .sub-menu-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-medium);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .sub-menu-link:hover {
            background: var(--cream-dark);
            color: var(--mint-dark);
        }
        
        .sub-menu-link.active {
            background: var(--mint-light);
            color: var(--mint-dark);
        }
        
        .content-area {
            flex: 1;
            background: white;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 
                12px 12px 28px rgba(0, 0, 0, 0.08),
                -6px -6px 14px rgba(255, 255, 255, 0.9);
            position: relative;
            overflow-y: auto;
        }
        
        .content-area::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            background: linear-gradient(145deg, #ffffff, #fafafa);
            border-radius: 24px;
            z-index: -1;
        }
        
        .page-container {
            height: 100%;
            overflow-y: auto;
        }
        
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 24px;
        }
        
        .welcome-icon {
            font-size: 140px;
            color: rgba(168, 230, 207, 0.3);
            animation: floatIcon 4s ease-in-out infinite;
        }
        
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .welcome-title span {
            color: var(--mint-dark);
        }
        
        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-light);
            font-weight: 600;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 
                8px 8px 16px rgba(0, 0, 0, 0.06),
                -4px -4px 8px rgba(255, 255, 255, 0.8);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--cream-dark);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
        }
        
        .btn {
            padding: 14px 28px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Nunito', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(145deg, var(--mint), var(--mint-dark));
            color: white;
            box-shadow: 
                6px 6px 12px rgba(168, 230, 207, 0.4),
                -3px -3px 6px rgba(255, 255, 255, 0.8);
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 
                10px 10px 20px rgba(168, 230, 207, 0.45),
                -5px -5px 10px rgba(255, 255, 255, 0.9);
        }
        
        .btn-danger {
            background: linear-gradient(145deg, var(--pink), var(--pink-dark));
            color: #8B4557;
            box-shadow: 
                6px 6px 12px rgba(255, 182, 193, 0.4),
                -3px -3px 6px rgba(255, 255, 255, 0.8);
        }
        
        .btn-danger:hover {
            transform: translateY(-4px);
            box-shadow: 
                10px 10px 20px rgba(255, 182, 193, 0.45),
                -5px -5px 10px rgba(255, 255, 255, 0.9);
        }
        
        .btn-secondary {
            background: var(--cream-dark);
            color: var(--text-medium);
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.04),
                -2px -2px 4px rgba(255, 255, 255, 0.8);
        }
        
        .btn-secondary:hover {
            background: var(--mint-light);
            color: var(--mint-dark);
            transform: translateY(-2px);
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.04);
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .data-table th {
            background: var(--cream-dark);
            padding: 18px 20px;
            text-align: left;
            font-weight: 800;
            color: var(--text-medium);
            font-size: 14px;
            border-bottom: 3px solid var(--cream-dark);
        }
        
        .data-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--cream-dark);
            color: var(--text-medium);
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .data-table tr:hover td {
            background: var(--cream-dark);
        }
        
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--text-medium);
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 16px;
            border: none;
            background: var(--cream-dark);
            color: var(--text-dark);
            font-weight: 600;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            box-shadow: 
                inset 4px 4px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            box-shadow: 
                inset 4px 4px 8px rgba(0, 0, 0, 0.06),
                0 0 0 4px rgba(168, 230, 207, 0.4);
        }
        
        .form-input::placeholder {
            color: var(--text-light);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: white;
            border-radius: 28px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            box-shadow: 
                20px 20px 40px rgba(0, 0, 0, 0.15),
                -10px -10px 20px rgba(255, 255, 255, 0.9);
            transform: scale(0.9) translateY(-20px);
            transition: all 0.3s;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--cream-dark);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
        }
        
        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--cream-dark);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .modal-close:hover {
            background: var(--pink);
            color: white;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 2px solid var(--cream-dark);
        }
        
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        .page-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: none;
            background: white;
            color: var(--text-medium);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.06),
                -2px -2px 4px rgba(255, 255, 255, 0.8);
            transition: all 0.3s;
        }
        
        .page-btn:hover {
            background: var(--mint-light);
            color: var(--mint-dark);
            transform: translateY(-2px);
        }
        
        .page-btn.active {
            background: linear-gradient(145deg, var(--mint), var(--mint-dark));
            color: white;
            box-shadow: 
                6px 6px 12px rgba(168, 230, 207, 0.4);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .scrollbar::-webkit-scrollbar-track {
            background: var(--cream-dark);
            border-radius: 10px;
        }
        
        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--mint);
            border-radius: 10px;
        }
        
        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--mint-dark);
        }
    </style>
</head>
<body>
    <div class="layout-container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <span class="logo-text">京东仓储管理系统</span>
            </div>
            <div class="user-section">
                <div class="user-info">
                    <span class="user-icon">👤</span>
                    <span class="user-name" id="userName">管理员</span>
                    <span class="role-badge" id="roleName">管理员</span>
                </div>
                <div class="dropdown-menu">
                    <div class="dropdown-item" onclick="showChangePwdModal()">修改密码</div>
                    <div class="dropdown-item" onclick="logout()">退出登录</div>
                </div>
            </div>
        </header>
        
        <div class="main-content">
            <aside class="sidebar">
                <ul class="menu-list" id="menuNav"></ul>
            </aside>
            
            <main class="content-area">
                <div class="page-container scrollbar" id="mainContent">
                    <div class="welcome-container">
                        <span class="welcome-icon">📦</span>
                        <div class="welcome-title">
                            <span>🏠</span>
                            <span>欢迎使用京东仓储管理系统</span>
                        </div>
                        <div class="welcome-subtitle">请从左侧菜单选择功能模块</div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div class="modal-overlay" id="changePwdModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">修改密码</span>
                <button class="modal-close" onclick="closeChangePwdModal()">×</button>
            </div>
            <div>
                <div class="form-group">
                    <label class="form-label">旧密码</label>
                    <input type="password" class="form-input" id="oldPassword" placeholder="请输入旧密码">
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="请输入新密码">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="请确认新密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeChangePwdModal()">取消</button>
                <button class="btn btn-primary" onclick="changePassword()">确定</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js?v=20260516"></script>
    <script>
        const axiosInstance = axios.create({
            baseURL: window.location.origin + '/api',
            timeout: 30000,
        });
        
        axiosInstance.interceptors.request.use(config => {
            if (!config.url.startsWith('http')) {
                config.url = window.location.origin + '/api' + (config.url.startsWith('/') ? '' : '/') + config.url;
            }
            return config;
        });

        axiosInstance.interceptors.request.use(
            config => {
                const token = localStorage.getItem('token');
                if (token) {
                    config.headers.Authorization = 'Bearer ' + token;
                }
                return config;
            },
            error => {
                return Promise.reject(error);
            }
        );

        axiosInstance.interceptors.response.use(
            response => {
                return response.data;
            },
            error => {
                if (error.response && error.response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    localStorage.removeItem('role');
                    window.location.href = '/login.html';
                }
                return Promise.reject(error);
            }
        );

        function apiGet(url, params) {
            return axiosInstance.get(url, { params });
        }

        function apiPost(url, data) {
            return axiosInstance.post(url, data);
        }

        function apiPut(url, data) {
            return axiosInstance.put(url, data);
        }

        function apiDelete(url) {
            return axiosInstance.delete(url);
        }

        let currentRole = '';

        function initMenu() {
            const role = localStorage.getItem('role');
            currentRole = role;
            
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userName').textContent = user.name || '管理员';
            
            const roleNames = {
                'MANAGER': '管理员',
                'ADMINISTRATOR': '仓储主管',
                'OPERATOR': '操作员'
            };
            document.getElementById('roleName').textContent = roleNames[role] || '管理员';

            const menus = {
                'MANAGER': [
                    { id: 'user', name: '用户管理', icon: '👥', url: 'pages/user.html' },
                    { id: 'role', name: '角色管理', icon: '🎭', url: 'pages/role.html' },
                    { id: 'permission', name: '权限管理', icon: '🔑', url: 'pages/permission.html' },
                    { id: 'warehouse', name: '仓库管理', icon: '🏭', url: 'pages/warehouse.html' },
                    { id: 'backup', name: '数据备份', icon: '💾', url: 'pages/backup.html' },
                    { id: 'monitor', name: '系统监控', icon: '📊', url: 'pages/monitor.html' },
                    { id: 'log', name: '操作日志', icon: '📝', url: 'pages/log.html' }
                ],
                'ADMINISTRATOR': [
                    { id: 'inventory', name: '库存监控', icon: '📊', url: 'pages/inventory.html' },
                    { id: 'task-admin', name: '任务调度', icon: '📋', url: 'pages/task-admin.html' },
                    { id: 'performance', name: '绩效管理', icon: '📈', url: 'pages/performance.html' },
                    { id: 'quality', name: '质量检查', icon: '✅', url: 'pages/quality.html' },
                    { id: 'alert', name: '预警管理', icon: '🔔', url: 'pages/alert.html' }
                ],
                'OPERATOR': [
                    { id: 'stockIn', name: '入库管理', icon: '📥', url: 'pages/stock-in-operator.html' },
                    { id: 'stockOut', name: '出库管理', icon: '📤', url: 'pages/stock-out-operator.html' },
                    { id: 'task', name: '任务看板', icon: '📋', url: 'pages/task-operator.html' },
                    { id: 'inventory', name: '库存盘点', icon: '📦', url: 'pages/inventory-check-operator.html' },
                    { id: 'location', name: '货位管理', icon: '📍', url: 'pages/location-operator.html' },
                    { id: 'exception', name: '异常处理', icon: '⚠️', url: 'pages/exception-operator.html' }
                ]
            };

            const menuList = document.getElementById('menuNav');
            menuList.innerHTML = '';
            
            (menus[role] || []).forEach(menu => {
                const li = document.createElement('li');
                li.className = 'menu-item';
                li.innerHTML = `
                    <a href="javascript:;" class="menu-link" onclick="loadPage('${menu.url}')">
                        <span class="menu-icon">${menu.icon}</span>
                        <span>${menu.name}</span>
                    </a>
                `;
                menuList.appendChild(li);
            });
        }

        function loadPage(url) {
            document.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active'));
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url + '?_=' + Date.now(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const mainContent = document.getElementById('mainContent');
                    mainContent.innerHTML = xhr.responseText;
                    
                    setTimeout(() => {
                        const scripts = mainContent.querySelectorAll('script');
                        scripts.forEach(script => {
                            const newScript = document.createElement('script');
                            if (script.src) {
                                newScript.src = script.src + '?_=' + Date.now();
                            } else {
                                newScript.textContent = script.textContent;
                            }
                            document.head.appendChild(newScript);
                            newScript.remove();
                        });
                    }, 100);
                }
            };
            xhr.send();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('role');
            window.location.href = '/login.html';
        }

        function showChangePwdModal() {
            document.getElementById('changePwdModal').classList.add('active');
        }

        function closeChangePwdModal() {
            document.getElementById('changePwdModal').classList.remove('active');
        }

        function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!oldPassword || !newPassword || !confirmPassword) {
                alert('请填写完整信息');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            const url = currentRole === 'MANAGER' ? '/auth/manager/changePassword' :
                       currentRole === 'ADMINISTRATOR' ? '/auth/administrator/changePassword' :
                       '/auth/operator/changePassword';

            apiPost(url, { oldPassword, newPassword }).then(res => {
                alert('密码修改成功');
                closeChangePwdModal();
                logout();
            }).catch(err => {
                alert(err.response?.data?.msg || '密码修改失败');
            });
        }

        initMenu();
    </script>
</body>
</html>
