<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 京东仓储管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.11/dist/css/layui.css">
    <style>
        body { background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%); }
        .login-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 420px; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-title { text-align: center; margin-bottom: 30px; }
        .login-title h1 { font-size: 24px; color: #1e88e5; margin-bottom: 8px; }
        .login-title p { color: #999; font-size: 14px; }
        .role-tabs { display: flex; margin-bottom: 20px; }
        .role-tab { flex: 1; text-align: center; padding: 12px; background: #f5f7fa; cursor: pointer; transition: all 0.3s; border-radius: 6px; }
        .role-tab.active { background: #1e88e5; color: #fff; }
        
        .login-btn { width: 100%; background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%); border: none; height: 44px; font-size: 16px; }
        .login-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-title">
                <h1><i class="layui-icon" style="font-size: 32px;">&#xe613;</i> 仓储管理系统</h1>
                <p>请选择角色登录</p>
            </div>
            
            <div class="role-tabs">
                <div class="role-tab active" data-role="OPERATOR">操作员</div>
                <div class="role-tab" data-role="ADMINISTRATOR">仓储主管</div>
                <div class="role-tab" data-role="MANAGER">管理员</div>
            </div>

            <form class="layui-form" id="loginForm">
                <div class="layui-form-item" id="usernameDiv">
                    <label class="layui-form-label">用户名/工号</label>
                    <div class="layui-input-block">
                        <input type="text" name="loginKey" required lay-verify="required" placeholder="请输入用户名或工号" class="layui-input">
                    </div>
                </div>
                
                <div class="layui-form-item" id="phoneDiv" style="display: none;">
                    <label class="layui-form-label">手机号</label>
                    <div class="layui-input-block">
                        <input type="text" name="phone" required lay-verify="required" placeholder="请输入手机号" class="layui-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label">密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" required lay-verify="required" placeholder="请输入密码" class="layui-input">
                    </div>
                </div>

                

                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button type="button" class="layui-btn login-btn" id="loginBtn">登录</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.11/dist/layui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script>
        let currentRole = 'OPERATOR';

        layui.use(['layer', 'form'], function(){
            const layer = layui.layer;
            const form = layui.form;

            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.addEventListener('click', function(){
                    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentRole = this.dataset.role;
                });
            });

            document.getElementById('loginBtn').addEventListener('click', function(){
                const loginKey = document.querySelector('input[name="loginKey"]').value;
                const password = document.querySelector('input[name="password"]').value;
                
                if (!loginKey || !password) {
                    layer.msg('请填写完整信息');
                    return;
                }

                const data = { password: password };
                let url = '';
                
                if (currentRole === 'OPERATOR') {
                    data.loginKey = loginKey;
                    url = '/api/auth/operator/login';
                } else if (currentRole === 'ADMINISTRATOR') {
                    data.loginKey = loginKey;
                    url = '/api/auth/administrator/login';
                } else if (currentRole === 'MANAGER') {
                    data.loginKey = loginKey;
                    url = '/api/auth/manager/login';
                }
                
                axios.post(url, data).then(res => {
                    handleLoginSuccess(res);
                }).catch(err => {
                    layer.msg(err.response?.data?.msg || '登录失败');
                });
            });

            function handleLoginSuccess(res) {
                localStorage.setItem('token', res.data.data.token);
                localStorage.setItem('user', JSON.stringify(res.data.data.user));
                localStorage.setItem('role', res.data.data.user.roleCode);
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
