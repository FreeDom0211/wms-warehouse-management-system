<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 京东仓储管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #FDF8F3;
            min-height: 100vh; 
            overflow: hidden;
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .floating-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        
        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatBlob 25s ease-in-out infinite;
        }
        
        .blob-mint {
            width: 350px;
            height: 350px;
            background: #A8E6CF;
            top: -120px;
            right: -80px;
        }
        
        .blob-pink {
            width: 300px;
            height: 300px;
            background: #FFB6C1;
            bottom: -100px;
            left: -50px;
            animation-delay: -12s;
        }
        
        .blob-blue {
            width: 250px;
            height: 250px;
            background: #87CEEB;
            top: 40%;
            right: 30%;
            animation-delay: -20s;
        }
        
        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.15); }
            50% { transform: translate(-40px, 60px) scale(0.85); }
            75% { transform: translate(40px, 25px) scale(1.1); }
        }
        
        .login-container { 
            position: relative; 
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card { 
            background: white;
            border-radius: 36px; 
            padding: 60px; 
            width: 480px;
            box-shadow: 
                25px 25px 50px rgba(0, 0, 0, 0.15),
                -10px -10px 20px rgba(255, 255, 255, 0.6);
            position: relative;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            background: linear-gradient(145deg, #ffffff, #fafafa);
            border-radius: 32px;
            z-index: -1;
        }
        
        .login-title { 
            text-align: center; 
            margin-bottom: 50px; 
        }
        
        .login-title h1 { 
            font-size: 36px; 
            color: #3D405B; 
            margin-bottom: 18px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 800;
        }
        
        .login-title h1 i {
            font-size: 44px;
            background: linear-gradient(145deg, #A8E6CF, #6BCB77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-title p { 
            color: #8B8B8B; 
            font-size: 16px; 
            font-weight: 600;
        }
        
        .role-tabs { 
            display: flex; 
            gap: 15px;
            margin-bottom: 40px; 
            background: #F5F0E8;
            padding: 8px;
            border-radius: 24px;
            box-shadow: 
                inset 4px 4px 10px rgba(0, 0, 0, 0.05);
        }
        
        .role-tab { 
            flex: 1; 
            text-align: center; 
            padding: 18px 15px; 
            cursor: pointer; 
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 20px;
            color: #6B6B6B;
            font-weight: 700;
            font-size: 14px;
            background: transparent;
            position: relative;
        }
        
        .role-tab:hover {
            transform: translateY(-4px);
            background: white;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.08);
        }
        
        .role-tab.active { 
            background: linear-gradient(145deg, #A8E6CF, #8BD99B);
            color: #2D5A3D;
            box-shadow: 
                10px 10px 20px rgba(168, 230, 207, 0.4),
                -5px -5px 10px rgba(255, 255, 255, 0.8);
            transform: translateY(-4px);
        }
        
        .form-group {
            margin-bottom: 35px;
        }
        
        .form-label {
            display: block;
            color: #6B6B6B;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 15px;
        }
        
        .form-input {
            width: 100%;
            background: #FAF7F2;
            border: none;
            border-radius: 20px;
            color: #3D405B;
            height: 58px;
            padding: 0 24px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Nunito', sans-serif;
            box-shadow: 
                inset 4px 4px 10px rgba(0, 0, 0, 0.06),
                inset -2px -2px 6px rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            box-shadow: 
                inset 6px 6px 12px rgba(0, 0, 0, 0.08),
                0 0 0 4px rgba(168, 230, 207, 0.3);
            transform: translateY(-2px);
        }
        
        .form-input::placeholder {
            color: #ABABAB;
            font-weight: 600;
        }
        
        .login-btn { 
            width: 100%; 
            background: linear-gradient(145deg, #A8E6CF, #6BCB77);
            border: none; 
            height: 62px; 
            font-size: 18px; 
            font-weight: 800;
            border-radius: 24px;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 
                14px 14px 28px rgba(107, 203, 119, 0.4),
                -7px -7px 14px rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            font-family: 'Nunito', sans-serif;
        }
        
        .login-btn:hover {
            transform: translateY(-6px);
            box-shadow: 
                18px 18px 36px rgba(107, 203, 119, 0.45),
                -10px -10px 20px rgba(255, 255, 255, 0.7);
        }
        
        .login-btn:active {
            transform: translateY(-3px);
            box-shadow: 
                10px 10px 20px rgba(107, 203, 119, 0.35);
        }
        
        .powered-by {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid rgba(0, 0, 0, 0.04);
        }
        
        .powered-by p {
            color: #ABABAB;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-indicator {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 32px;
            background: white;
            border-radius: 50px;
            box-shadow: 
                12px 12px 24px rgba(0, 0, 0, 0.12),
                -6px -6px 12px rgba(255, 255, 255, 0.8);
        }
        
        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(145deg, #A8E6CF, #6BCB77);
            box-shadow: 
                0 0 15px rgba(107, 203, 119, 0.5);
            animation: pulseClay 2s ease-in-out infinite;
        }
        
        @keyframes pulseClay {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.85); opacity: 0.7; }
        }
        
        .status-text {
            color: #5B5B5B;
            font-size: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="floating-blobs">
        <div class="blob blob-mint"></div>
        <div class="blob blob-pink"></div>
        <div class="blob blob-blue"></div>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-title">
                <h1><span style="font-weight:900;">🏠</span> 仓储管理系统</h1>
                <p>请选择角色登录</p>
            </div>
            
            <div class="role-tabs">
                <div class="role-tab active" data-role="OPERATOR">操作员</div>
                <div class="role-tab" data-role="ADMINISTRATOR">仓储主管</div>
                <div class="role-tab" data-role="MANAGER">管理员</div>
            </div>

            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="loginKey" class="form-input" placeholder="请输入用户名或工号">
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码">
            </div>

            <button class="login-btn" id="loginBtn">登录</button>
            
            <div class="powered-by">
                <p>Powered by JD WMS System</p>
            </div>
        </div>
    </div>
    
    <div class="status-indicator">
        <div class="status-dot"></div>
        <span class="status-text">系统在线</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script>
        let currentRole = 'OPERATOR';

        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.addEventListener('click', function(){
                document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentRole = this.dataset.role;
            });
        });

        document.getElementById('loginBtn').addEventListener('click', function(){
            const loginKey = document.getElementById('loginKey').value;
            const password = document.getElementById('password').value;
            
            if (!loginKey || !password) {
                alert('请填写完整信息');
                return;
            }

            const data = { password: password };
            let url = '';
            
            if (currentRole === 'OPERATOR') {
                data.loginKey = loginKey;
                url = '/api/auth/operator/login';
            } else if (currentRole === 'ADMINISTRATOR') {
                data.loginKey = loginKey;
                url = '/api/auth/administrator/login';
            } else if (currentRole === 'MANAGER') {
                data.loginKey = loginKey;
                url = '/api/auth/manager/login';
            }
            
            axios.post(url, data).then(res => {
                handleLoginSuccess(res);
            }).catch(err => {
                alert(err.response?.data?.msg || '登录失败');
            });
        });

        function handleLoginSuccess(res) {
            localStorage.setItem('token', res.data.data.token);
            localStorage.setItem('user', JSON.stringify(res.data.data.user));
            localStorage.setItem('role', res.data.data.user.roleCode);
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
